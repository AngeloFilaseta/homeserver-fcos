worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # --- Logging ---
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---------------------------------------------------------------
    # Redirect HTTP → HTTPS
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name homeassistant.angiogio.site;
        return 301 https://$host$request_uri;
    }

    server {
        listen 80;
        server_name journiv.angiogio.site;
        return 301 https://$host$request_uri;
    }

    # ---------------------------------------------------------------
    # Home Assistant
    # ---------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name homeassistant.angiogio.site;

        ssl_certificate     /etc/nginx/certs/cloudflare-origin.crt;
        ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        
        location / {
            proxy_pass         http://127.0.0.1:8123;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Required by Home Assistant for WebSocket support
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ---------------------------------------------------------------
    # Journiv
    # ---------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name journiv.angiogio.site;

        ssl_certificate     /etc/nginx/certs/cloudflare-origin.crt;
        ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
